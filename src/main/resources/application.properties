# =============================================
# VULNERABLE CONFIG — DO NOT USE IN PRODUCTION
# =============================================

# Server
server.port=8080

# H2 Database (in-memory, console enabled — also a vulnerability!)
spring.datasource.url=jdbc:h2:mem:vulndb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Secret (weak, hardcoded — intentional vulnerability)
jwt.secret=secret123

# Thymeleaf (disable caching for dev)
spring.thymeleaf.cache=false

# Logging
logging.level.com.vulnerable=DEBUG
